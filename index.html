<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherBoard — Evan Michineau</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f4f6f9;
      --surface:  #ffffff;
      --surface2: #eef1f5;
      --border:   rgba(0,0,0,0.08);
      --text:     #1a1a2e;
      --muted:    #6b7280;
      --accent:   #2563eb;
      --accent2:  #1d4ed8;
      --radius:   12px;
      --shadow:   0 2px 12px rgba(0,0,0,0.06);
    }

    [data-theme="night"] {
      --bg:       #0f1117;
      --surface:  #1a1d26;
      --surface2: #22263a;
      --border:   rgba(255,255,255,0.08);
      --text:     #e8eaf0;
      --muted:    #9ca3af;
      --accent:   #60a5fa;
      --accent2:  #3b82f6;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--text); font-weight: 400; }

    .theme-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      transition: all 0.2s;
    }
    .theme-btn:hover { background: var(--surface2); color: var(--text); }

    /* ===== SEARCH ===== */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }

    .btn {
      padding: 12px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surface2); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

    /* ===== MAIN WEATHER CARD ===== */
    .main-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }

    .city-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.25rem;
    }

    .city-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }

    .city-date {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .day-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .day-badge.jour { background: #fef9c3; color: #854d0e; }
    .day-badge.nuit { background: #1e3a5f; color: #93c5fd; }

    .temp-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .weather-icon { font-size: 60px; line-height: 1; }

    .temp-info .temp {
      font-size: 4rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .temp-info .desc {
      font-size: 15px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: capitalize;
    }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    /* ===== FORECAST ===== */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 1.5rem 0 0.75rem;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .forecast-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 8px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .forecast-day { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .forecast-icon { font-size: 24px; margin-bottom: 6px; }
    .forecast-max { font-size: 15px; font-weight: 700; color: var(--text); }
    .forecast-min { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ===== LOADING / ERROR ===== */
    .state-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .state-box .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .state-box p { color: var(--muted); font-size: 15px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 12px;
      color: var(--muted);
    }
    footer a { color: var(--accent); text-decoration: none; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 520px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .forecast-grid { grid-template-columns: repeat(3, 1fr); }
      .temp-info .temp { font-size: 3rem; }
      .weather-icon { font-size: 44px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Weather<span>Board</span></div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 Mode nuit</button>
  </header>

  <div class="search-row">
    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Entrez une ville (ex: Paris, Tokyo, New York...)"
      onkeydown="if(event.key==='Enter') searchCity()"
    />
    <button class="btn btn-primary" onclick="searchCity()">Rechercher</button>
    <button class="btn" onclick="geolocate()" title="Utiliser ma position">📍 Localiser</button>
  </div>

  <div id="weatherContent">
    <div class="state-box">
      <div class="icon">🌤️</div>
      <p>Entrez une ville ou utilisez la géolocalisation pour démarrer.</p>
    </div>
  </div>
</div>

<footer>
  Développé par <a href="#">Evan Michineau</a> &mdash; BTS SIO SLAM 2025-2027
  &mdash; Données : <a href="https://openweathermap.org" target="_blank">OpenWeatherMap</a>
</footer>

<script>
  /* ===== CONFIG ===== */
  // 1. Créer un compte gratuit sur https://openweathermap.org
  // 2. Générer une clé API et la coller ici :
  const API_KEY = '0378286138b8082251d085c9456d8d22';
  const BASE    = 'https://api.openweathermap.org/data/2.5';

  /* ===== THEME ===== */
  const hour = new Date().getHours();
  let isNight = hour < 7 || hour >= 20;
  applyTheme();

  function applyTheme() {
    document.body.setAttribute('data-theme', isNight ? 'night' : 'day');
    document.getElementById('themeBtn').textContent = isNight ? '☀️ Mode jour' : '🌙 Mode nuit';
  }

  function toggleTheme() {
    isNight = !isNight;
    applyTheme();
  }

  /* ===== ICONS ===== */
  const ICONS = {
    '01d':'☀️','01n':'🌙','02d':'🌤️','02n':'🌤️',
    '03d':'🌥️','03n':'🌥️','04d':'☁️','04n':'☁️',
    '09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️',
    '11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️',
    '50d':'🌫️','50n':'🌫️',
  };

  function getIcon(code) { return ICONS[code] || '🌡️'; }

  /* ===== UTILS ===== */
  function formatDate(ts) {
    return new Date(ts * 1000).toLocaleDateString('fr-FR', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  function formatTime(ts) {
    return new Date(ts * 1000).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function dayName(ts) {
    return new Date(ts * 1000).toLocaleDateString('fr-FR', { weekday: 'short' });
  }

  function showLoading() {
    document.getElementById('weatherContent').innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <p>Chargement des données météo...</p>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('weatherContent').innerHTML = `
      <div class="state-box">
        <div class="icon">⚠️</div>
        <p>${msg}</p>
      </div>`;
  }

  /* ===== API CALLS ===== */
  async function fetchWeather(lat, lon) {
    if (API_KEY === 'VOTRE_CLE_API_ICI') {
      showError('Clé API manquante. Ouvre le fichier et remplace <strong>VOTRE_CLE_API_ICI</strong> par ta clé OpenWeatherMap.');
      return;
    }

    showLoading();

    try {
      const [current, forecast] = await Promise.all([
        fetch(`${BASE}/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=fr`).then(r => r.json()),
        fetch(`${BASE}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=fr`).then(r => r.json())
      ]);

      if (current.cod !== 200) { showError('Erreur API : ' + current.message); return; }

      renderWeather(current, forecast);
    } catch(e) {
      showError('Impossible de récupérer les données. Vérifiez votre connexion.');
    }
  }

  async function fetchByCity(city) {
    if (API_KEY === 'VOTRE_CLE_API_ICI') {
      showError('Clé API manquante. Ouvre le fichier et remplace <strong>VOTRE_CLE_API_ICI</strong> par ta clé OpenWeatherMap.');
      return;
    }

    showLoading();

    try {
      const geo = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(city)}&limit=1&appid=${API_KEY}`).then(r => r.json());
      if (!geo.length) { showError(`Ville introuvable : "${city}"`); return; }
      await fetchWeather(geo[0].lat, geo[0].lon);
    } catch(e) {
      showError('Erreur lors de la recherche de la ville.');
    }
  }

  /* ===== RENDER ===== */
  function renderWeather(current, forecast) {
    const sunIsUp = Date.now()/1000 > current.sys.sunrise && Date.now()/1000 < current.sys.sunset;
    const badgeClass = sunIsUp ? 'jour' : 'nuit';
    const badgeLabel = sunIsUp ? '☀️ Jour' : '🌙 Nuit';

    // Prévisions : 1 point par jour à midi
    const dailyMap = {};
    forecast.list.forEach(item => {
      const d = new Date(item.dt * 1000);
      const key = d.toDateString();
      if (!dailyMap[key]) dailyMap[key] = { items: [], dt: item.dt };
      dailyMap[key].items.push(item);
    });

    const days = Object.values(dailyMap).slice(0, 5);

    const forecastHTML = days.map(day => {
      const temps = day.items.map(i => i.main.temp);
      const max = Math.round(Math.max(...temps));
      const min = Math.round(Math.min(...temps));
      const midItem = day.items[Math.floor(day.items.length / 2)];
      return `
        <div class="forecast-card">
          <div class="forecast-day">${dayName(day.dt)}</div>
          <div class="forecast-icon">${getIcon(midItem.weather[0].icon)}</div>
          <div class="forecast-max">${max}°</div>
          <div class="forecast-min">${min}°</div>
        </div>`;
    }).join('');

    document.getElementById('weatherContent').innerHTML = `
      <div class="main-card">
        <div class="city-row">
          <div>
            <div class="city-name">${current.name}, ${current.sys.country}</div>
            <div class="city-date">${formatDate(current.dt)}</div>
          </div>
          <span class="day-badge ${badgeClass}">${badgeLabel}</span>
        </div>

        <div class="temp-row">
          <div class="weather-icon">${getIcon(current.weather[0].icon)}</div>
          <div class="temp-info">
            <div class="temp">${Math.round(current.main.temp)}°C</div>
            <div class="desc">${current.weather[0].description}</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">Ressenti</div>
            <div class="stat-value">${Math.round(current.main.feels_like)}°C</div>
          </div>
          <div class="stat">
            <div class="stat-label">Humidité</div>
            <div class="stat-value">${current.main.humidity}%</div>
          </div>
          <div class="stat">
            <div class="stat-label">Vent</div>
            <div class="stat-value">${Math.round(current.wind.speed * 3.6)} km/h</div>
          </div>
          <div class="stat">
            <div class="stat-label">Pression</div>
            <div class="stat-value">${current.main.pressure} hPa</div>
          </div>
          <div class="stat">
            <div class="stat-label">Lever soleil</div>
            <div class="stat-value">${formatTime(current.sys.sunrise)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Coucher soleil</div>
            <div class="stat-value">${formatTime(current.sys.sunset)}</div>
          </div>
        </div>
      </div>

      <div class="section-title">Prévisions 5 jours</div>
      <div class="forecast-grid">${forecastHTML}</div>
    `;
  }

  /* ===== ACTIONS ===== */
  function searchCity() {
    const city = document.getElementById('searchInput').value.trim();
    if (!city) return;
    fetchByCity(city);
  }

  function geolocate() {
    if (!navigator.geolocation) { showError('Géolocalisation non supportée par ce navigateur.'); return; }
    showLoading();
    navigator.geolocation.getCurrentPosition(
      pos => fetchWeather(pos.coords.latitude, pos.coords.longitude),
      ()  => showError('Impossible d\'accéder à votre position. Vérifiez les permissions.')
    );
  }
</script>
</body>
</html>
